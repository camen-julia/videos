<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Video Admin</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎬 Video Admin</h1>

<div class="card">

<input
id="title"
type="text"
placeholder="Video Title">

<input
id="videoUrl"
type="text"
placeholder="https://youtube.com/...">

<button id="saveBtn">

💾 Save Video

</button>

<p id="status"></p>

</div>

<div class="summary">

<div class="box">

<h3>Total Videos</h3>

<p id="totalVideos">0</p>

</div>

<div class="box">

<h3>Total Likes</h3>

<p id="totalLikes">0</p>

</div>

<div class="box">

<h3>Total Views</h3>

<p id="totalViews">0</p>

</div>

</div>

<div class="search">

<input
id="search"
type="text"
placeholder="Search...">

</div>

<div id="videoList"></div>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
