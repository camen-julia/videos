<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

h1,h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#ff3b30;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#ff2200;
}

#status{
margin-top:20px;
margin-bottom:20px;
text-align:center;
font-size:18px;
color:#00ff99;
}

.video-item{
background:#222;
padding:15px;
border-radius:10px;
margin:10px 0;
display:flex;
align-items:center;
gap:15px;
}

.video-item img{
width:120px;
height:70px;
object-fit:cover;
border-radius:8px;
}

.video-info{
flex:1;
}

.video-info h3{
margin-bottom:5px;
}

.delete-btn{
width:auto;
padding:8px 15px;
background:red;
font-size:14px;
}

.delete-btn:hover{
background:#b00000;
}
</style>

</head>

<body>

<body>

<div class="container">

<h1>🎬 Video Admin</h1>

<input
id="title"
type="text"
placeholder="Video Title">

<input
id="thumbnail"
type="text"
placeholder="Thumbnail Image URL">

<input
id="videoUrl"
type="text"
placeholder="YouTube / Facebook / TikTok URL">

<button id="saveBtn">
💾 Save Video
</button>

<p id="status"></p>

<hr>

<h2>📃 All Videos</h2>

<div id="videoList"></div>

</div>

</body>

</body>
</html>
