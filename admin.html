<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

h1,h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#ff3b30;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#ff2200;
}

#status{
margin-top:20px;
margin-bottom:20px;
text-align:center;
font-size:18px;
color:#00ff99;
}

.video-item{
background:#222;
padding:15px;
border-radius:10px;
margin:10px 0;
display:flex;
align-items:center;
gap:15px;
}

.video-item img{
width:120px;
height:70px;
object-fit:cover;
border-radius:8px;
}

.video-info{
flex:1;
}

.video-info h3{
margin-bottom:5px;
}

.delete-btn{
width:auto;
padding:8px 15px;
background:red;
font-size:14px;
}

.delete-btn:hover{
background:#b00000;
}
</style>

</head>

<body>

<div class="container">

<h1>🎬 Admin Panel</h1>

<input id="title" placeholder="Video Title">

<input id="category" placeholder="Category">

<input id="thumbnail" placeholder="Thumbnail Image URL">

<input id="videoUrl" placeholder="Video URL">

<button id="saveBtn">Save Video</button>

<div id="status"></div>

<hr style="margin:30px 0">

<h2>Video List</h2>

<div id="videoList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBUUyZ-NgqhvrLve4u7BpDKbt560P5UJgQ",
authDomain:"videos-d583f.firebaseapp.com",
projectId:"videos-d583f",
storageBucket:"videos-d583f.firebasestorage.app",
messagingSenderId:"1027579550246",
appId:"1:1027579550246:web:3979429f01d4aa763b64e7"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const videoList=document.getElementById("videoList");

async function loadVideos(){

const snapshot=await getDocs(collection(db,"videos"));

videoList.innerHTML="";

snapshot.forEach((item)=>{

const video=item.data();

videoList.innerHTML+=`

<div class="video-item">

<img src="${video.thumbnail}" alt="">

<div class="video-info">

<h3>${video.title}</h3>

<p>${video.category}</p>

</div>

<button class="delete-btn" onclick="deleteVideo('${item.id}')">

Delete

</button>

</div>

`;

});

}

window.deleteVideo=async(id)=>{

if(!confirm("Delete this video?")) return;

await deleteDoc(doc(db,"videos",id));

loadVideos();

};

document.getElementById("saveBtn").onclick=async()=>{

const title=document.getElementById("title").value.trim();

const category=document.getElementById("category").value.trim();

const thumbnail=document.getElementById("thumbnail").value.trim();

const videoUrl=document.getElementById("videoUrl").value.trim();

if(!title||!category||!thumbnail||!videoUrl){

alert("Please fill all fields");

return;

}

try{

await addDoc(collection(db,"videos"),{

title,

category,

thumbnail,

videoUrl

});

document.getElementById("status").innerHTML="✅ Video Saved Successfully";

document.getElementById("title").value="";

document.getElementById("category").value="";

document.getElementById("thumbnail").value="";

document.getElementById("videoUrl").value="";

loadVideos();

}catch(e){

console.error(e);

document.getElementById("status").innerHTML="❌ "+e.message;

}

};

loadVideos();

</script>

</body>
</html>
