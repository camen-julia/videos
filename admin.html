<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Admin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:#fff;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:#222;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin:10px 0;
    font-size:16px;
}

button{
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

#saveBtn{
    width:100%;
    padding:14px;
    background:#ff3b30;
    color:#fff;
    font-size:18px;
}

#saveBtn:hover{
    background:#e53935;
}

#status{
    margin-top:15px;
    text-align:center;
    color:#00ff99;
    font-weight:bold;
}

h2{
    margin:20px 0;
}

.video-item{
    display:flex;
    gap:15px;
    align-items:center;
    background:#222;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
}

.video-item img{
    width:140px;
    height:80px;
    object-fit:cover;
    border-radius:8px;
}

.video-info{
    flex:1;
}

.video-info h3{
    margin-bottom:8px;
}

.video-info p{
    color:#bbb;
    margin:3px 0;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.edit-btn{

    background:#2196F3;
    color:white;
    padding:8px 15px;

}

.edit-btn:hover{

    background:#1565c0;

}

.delete-btn{

    background:#f44336;
    color:white;
    padding:8px 15px;

}

.delete-btn:hover{

    background:#c62828;

}

.search{

    margin:20px 0;

}

.search input{

    margin:0;

}

.summary{

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:20px;

}

.box{

    background:#222;
    padding:15px;
    border-radius:10px;
    text-align:center;

}

.box h3{

    margin-bottom:8px;

}

.box p{

    font-size:24px;
    color:#ff3b30;

}

@media(max-width:700px){

.summary{

grid-template-columns:1fr;

}

.video-item{

flex-direction:column;
align-items:flex-start;

}

.video-item img{

width:100%;
height:200px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>🎬 Video Admin</h1>

<div class="card">

<input
id="title"
type="text"
placeholder="Video Title">

<input
id="videoUrl"
type="text"
placeholder="YouTube URL">

<button id="saveBtn">

💾 Save Video

</button>

<div id="status"></div>

</div>

<div class="summary">

<div class="box">

<h3>Total Videos</h3>

<p id="totalVideos">0</p>

</div>

<div class="box">

<h3>Total Likes</h3>

<p id="totalLikes">0</p>

</div>

<div class="box">

<h3>Total Views</h3>

<p id="totalViews">0</p>

</div>

</div>

<div class="search">

<input
id="search"
type="text"
placeholder="Search video...">

</div>

<h2>📃 All Videos</h2>

<div id="videoList">

</div>
<script type="module">

import {
    db,
    collection,
    getDocs,
    addDoc,
    updateDoc,
    deleteDoc,
    doc
} from "./firebase.js";

const title = document.getElementById("title");
const videoUrl = document.getElementById("videoUrl");
const saveBtn = document.getElementById("saveBtn");
const status = document.getElementById("status");
const videoList = document.getElementById("videoList");

const totalVideos = document.getElementById("totalVideos");
const totalLikes = document.getElementById("totalLikes");
const totalViews = document.getElementById("totalViews");

const search = document.getElementById("search");

let videos = [];
let editId = null;

loadVideos();

function getYoutubeThumbnail(url){

    let id="";

    if(url.includes("watch?v=")){
        id=url.split("watch?v=")[1].split("&")[0];
    }
    else if(url.includes("youtu.be/")){
        id=url.split("youtu.be/")[1].split("?")[0];
    }
    else if(url.includes("shorts/")){
        id=url.split("shorts/")[1].split("?")[0];
    }

    return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

}

saveBtn.onclick = async ()=>{

    if(!title.value || !videoUrl.value){

        alert("Please enter Title and YouTube URL");

        return;

    }

    const data={

        title:title.value.trim(),

        videoUrl:videoUrl.value.trim(),

        thumbnail:getYoutubeThumbnail(videoUrl.value.trim())

    };

    if(editId){

        await updateDoc(doc(db,"videos",editId),{

            title:data.title,

            videoUrl:data.videoUrl,

            thumbnail:data.thumbnail

        });

        editId=null;

        saveBtn.innerHTML="💾 Save Video";

        status.innerHTML="✅ Video Updated";

    }else{

        await addDoc(collection(db,"videos"),{

            ...data,

            likes:0,

            views:0

        });

        status.innerHTML="✅ Video Saved";

    }

    title.value="";
    videoUrl.value="";

    setTimeout(()=>{

        status.innerHTML="";

    },2000);

    loadVideos();

};

async function loadVideos(){

    videoList.innerHTML="";

    const snapshot=await getDocs(collection(db,"videos"));

    videos=snapshot.docs.map(d=>({

        id:d.id,

        ...d.data()

    }));

    let likeCount=0;
    let viewCount=0;

    videos.forEach(video=>{

        likeCount += video.likes || 0;

        viewCount += video.views || 0;

    });

    totalVideos.innerHTML = videos.length;

    totalLikes.innerHTML = likeCount;

    totalViews.innerHTML = viewCount;

    showVideos(videos);

}
  function showVideos(list){

    videoList.innerHTML = "";

    list.forEach(video=>{

        videoList.innerHTML += `

<div class="video-item">

<img src="${video.thumbnail}" alt="${video.title}">

<div class="video-info">

<h3>${video.title}</h3>

<p>❤️ ${video.likes || 0}</p>

<p>👁️ ${video.views || 0}</p>

<div class="actions">

<button
class="edit-btn"
onclick="globalThis.editVideo('${video.id}')">

✏️ Edit

</button>

<button
class="delete-btn"
onclick="globalThis.deleteVideo('${video.id}')">

🗑 Delete

</button>

</div>

</div>

</div>

`;

    });

}

search.addEventListener("input",()=>{

    const keyword = search.value.toLowerCase().trim();

    const result = videos.filter(video=>

        video.title.toLowerCase().includes(keyword)

    );

    showVideos(result);

});

globalThis.editVideo = function(id){

    const video = videos.find(v=>v.id===id);

    if(!video) return;

    editId = id;

    title.value = video.title;

    videoUrl.value = video.videoUrl;

    saveBtn.innerHTML = "💾 Update Video";

    window.scrollTo({

        top:0,

        behavior:"smooth"

    });

}

globalThis.deleteVideo = async function(id){

    if(!confirm("Delete this video?")) return;

    await deleteDoc(doc(db,"videos",id));

    status.innerHTML="🗑 Video Deleted";

    setTimeout(()=>{

        status.innerHTML="";

    },2000);

    loadVideos();

}

</script>

</body>
</html>
