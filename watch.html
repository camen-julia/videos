<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
body{
margin:0;
background:#111;
color:#fff;
font-family:Arial,sans-serif;
}

header{
background:#ff3b30;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

iframe{
width:100%;
height:70vh;
border:none;
border-radius:12px;
background:#000;
}

button{
margin-top:20px;
padding:12px 20px;
background:#ff3b30;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff2200;
}
</style>

</head>

<body>

<header>🎬 Watch Video</header>

<div class="container">

<iframe id="player" allowfullscreen></iframe>

<br>

<button onclick="history.back()">⬅ Back</button>

</div>

<script>

const params = new URLSearchParams(location.search);
let url = params.get("url");

if(url){

if(url.includes("watch?v=")){
const id = url.split("watch?v=")[1].split("&")[0];
url = "https://www.youtube.com/embed/" + id;
}

if(url.includes("youtu.be/")){
const id = url.split("youtu.be/")[1];
url = "https://www.youtube.com/embed/" + id;
}

document.getElementById("player").src = url;

}else{

document.body.innerHTML="<h2 style='text-align:center;margin-top:100px'>No Video Found</h2>";

}

</script>

</body>
</html>
