<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
overflow:hidden;
}

header{
position:fixed;
top:0;
left:0;
right:0;
padding:15px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(8px);
text-align:center;
font-size:22px;
font-weight:bold;
z-index:99;
}

.player{
margin-top:60px;
width:100%;
height:calc(100vh - 60px);
}

iframe{
width:100%;
height:100%;
border:none;
}

.bottom{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
z-index:100;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#ff3b30;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff2200;
}
</style>

</head>

<body>

<header>
🎬 Watch Video
</header>

<div class="player">
<iframe
id="player"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
allowfullscreen>
</iframe>
</div>

<div class="bottom">

<button onclick="history.back()">
⬅ Back
</button>

<button onclick="shareVideo()">
🔗 Share
</button>

<button onclick="openOriginal()">
🌐 Open
</button>

</div>

<script>

const params=new URLSearchParams(location.search);

let url=params.get("url");

if(!url){

document.body.innerHTML="<h2 style='text-align:center;margin-top:120px'>No Video</h2>";

}

function convert(url){

    if(!url) return "";

    if(url.includes("watch?v=")){
        const id = url.split("watch?v=")[1].split("&")[0];
        return "https://www.youtube.com/embed/" + id + "?autoplay=1&playsinline=1&rel=0";
    }

    if(url.includes("youtu.be/")){
        const id = url.split("youtu.be/")[1].split("?")[0];
        return "https://www.youtube.com/embed/" + id + "?autoplay=1&playsinline=1&rel=0";
    }

    if(url.includes("shorts/")){
        const id = url.split("shorts/")[1].split("?")[0];
        return "https://www.youtube.com/embed/" + id + "?autoplay=1&playsinline=1&rel=0";
    }

    return url;
}

console.log(url);
console.log(convert(url));

document.getElementById("player").src = convert(url);

async function shareVideo(){

if(navigator.share){

await navigator.share({

title:"Videos",

text:"Watch this video",

url:url

});

}else{

await navigator.clipboard.writeText(url);

alert("Video link copied");

}

}

function openOriginal(){

window.open(url,"_blank");

}

</script>

</body>
</html>
