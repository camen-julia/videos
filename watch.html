<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

header{
position:fixed;
top:0;
left:0;
right:0;
padding:15px;
background:#111;
text-align:center;
font-size:22px;
font-weight:bold;
z-index:100;
}

.player{
margin-top:60px;
width:100%;
height:calc(100vh - 60px);
}

iframe{
width:100%;
height:100%;
border:none;
}

.bottom{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:100;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#ff3b30;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ff2200;
}

</style>

</head>

<body>

<header>

🎬 Watch Video

</header>

<div class="player">

<iframe
id="player"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
allowfullscreen>
</iframe>

</div>

<div class="bottom">

<button onclick="history.back()">
⬅ Back
</button>

<button onclick="shareVideo()">
🔗 Share
</button>

<button onclick="openOriginal()">
🌐 Open
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const url = params.get("url");

if(!url){

document.body.innerHTML="<h2 style='text-align:center;margin-top:120px'>No Video Found</h2>";

throw new Error("No URL");

}

function getEmbedUrl(link){

try{

const u = new URL(link);

if(u.hostname.includes("youtu.be")){

const id=u.pathname.substring(1);

return "https://www.youtube.com/embed/"+id+"?autoplay=1&playsinline=1&rel=0";

}

if(u.pathname.startsWith("/watch")){

const id=u.searchParams.get("v");

return "https://www.youtube.com/embed/"+id+"?autoplay=1&playsinline=1&rel=0";

}

if(u.pathname.startsWith("/shorts/")){

const id=u.pathname.split("/shorts/")[1];

return "https://www.youtube.com/embed/"+id+"?autoplay=1&playsinline=1&rel=0";

}

}catch(e){}

return link;

}

document.getElementById("player").src=getEmbedUrl(url);

async function shareVideo(){

if(navigator.share){

await navigator.share({

title:"Videos",

url:url

});

}else{

await navigator.clipboard.writeText(url);

alert("Video link copied");

}

}

function openOriginal(){

window.open(url,"_blank");

}

</script>

</body>
</html>
