<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

header{
background:#ff3b30;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:12px;
background:#000;
}

button{
margin-top:20px;
padding:12px 20px;
background:#ff3b30;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<header>🎬 Watch Video</header>

<div class="container">

<iframe
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

<br>

<button onclick="history.back()">⬅ Back</button>

</div>

</body>
</html>
