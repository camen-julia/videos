<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

header{

position:fixed;
top:0;
left:0;
right:0;

background:#111;

padding:15px;

text-align:center;

font-size:22px;

font-weight:bold;

z-index:99;

}

.player{

margin-top:60px;

width:100%;

height:calc(100vh - 60px);

}

iframe{

width:100%;

height:100%;

border:none;

}

.bottom{

position:fixed;

bottom:15px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:15px;

}

button{

padding:12px 18px;

border:none;

border-radius:8px;

background:#ff3b30;

color:#fff;

cursor:pointer;

font-size:16px;

}

</style>

</head>

<body>

<header>

🎬 Watch Video

</header>

<div class="player">

<iframe
id="player"
allowfullscreen>

</iframe>

</div>

<div class="bottom">

<button onclick="history.back()">

⬅ Back

</button>

<button onclick="share()">

🔗 Share

</button>

</div>

<script>

const params=new URLSearchParams(location.search);

let url=params.get("url");

if(!url){

document.body.innerHTML="<h2 style='text-align:center;margin-top:120px'>No Video</h2>";

}

function convert(url){

if(url.includes("watch?v=")){

const id=url.split("watch?v=")[1].split("&")[0];

return "https://www.youtube.com/embed/"+id+"?autoplay=1";

}

if(url.includes("youtu.be/")){

const id=url.split("youtu.be/")[1];

return "https://www.youtube.com/embed/"+id+"?autoplay=1";

}

return url;

}

document.getElementById("player").src=convert(url);

async function share(){

if(navigator.share){

await navigator.share({

title:"Videos",

url:url

});

}else{

navigator.clipboard.writeText(url);

alert("Link copied");

}

}

</script>

</body>
</html>
