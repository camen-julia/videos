<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Videos</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    🎬 Videos
</header>

<div class="feed" id="videoList">

    <!-- Video Card -->

    <div class="video-card">

        <iframe
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            allowfullscreen>
        </iframe>

        <div class="overlay">

            <h2>Loading...</h2>

        </div>

        <div class="actions">

            <button>❤️</button>

            <span>0</span>

            <button>🔗</button>

            <button>👁️</button>

            <span>0</span>

        </div>

        <button class="watch-btn">

            Watch

        </button>

    </div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module" src="app.js"></script>

</body>
</html>
