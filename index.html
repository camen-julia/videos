<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
}

header{
background:#e50914;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
position:sticky;
top:0;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#222;
border-radius:12px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:15px;
}

button{
width:100%;
padding:12px;
border:none;
background:#ff3b30;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
border-radius:8px;
}

footer{
padding:30px;
text-align:center;
color:#888;
}
</style>

</head>

<body>

<header>🎬 Videos</header>

<div class="search">
<input type="text" placeholder="Search videos...">
</div>

<div class="grid">

<div class="card">
<img src="https://picsum.photos/500/300?1">
<div class="info">
<h3>Facebook Reel</h3>
<p>Trending video</p>
<button>Watch</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500/300?2">
<div class="info">
<h3>TikTok Video</h3>
<p>Latest upload</p>
<button>Watch</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500/300?3">
<div class="info">
<h3>Funny Video</h3>
<p>Most viewed</p>
<button onclick="location.href='watch.html'">Watch</button>
</div>
</div>

</div>

<footer>
© 2026 Videos
</footer>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUUyZ-NgqhvrLve4u7BpDKbt560P5UJgQ",
  authDomain: "videos-d583f.firebaseapp.com",
  projectId: "videos-d583f",
  storageBucket: "videos-d583f.firebasestorage.app",
  messagingSenderId: "1027579550246",
  appId: "1:1027579550246:web:3979429f01d4aa763b64e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("Firebase Connected!");

const snapshot = await getDocs(collection(db, "videos"));
const videos = snapshot.docs.map(doc => doc.data());

console.log(videos);
</script>
</body>
</html>
